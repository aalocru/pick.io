<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatchMaker Pickleball Pro</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 sm:p-6">

<div class="max-w-4xl mx-auto">
    <header class="text-center mb-8 bg-blue-600 text-white p-6 rounded-2xl shadow-lg">
        <h1 class="text-3xl font-bold">🏓 MatchMaker Pickleball</h1>
        <p class="text-blue-100 text-sm">Gestión Profesional de Rotaciones</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-white p-5 rounded-xl shadow border border-gray-200">
            <h2 id="form-title" class="font-bold mb-4">Añadir Jugador</h2>
            <form onsubmit="return handleForm(event)" id="player-form" class="space-y-4">
                <input type="hidden" id="p-id" value="">
                <input type="text" id="p-name" placeholder="Nombre" required class="w-full p-2 border rounded">
                <input type="number" id="p-level" min="1" max="10" value="5" class="w-full p-2 border rounded">
                <button type="submit" id="btn-submit" class="w-full bg-blue-600 text-white p-2 rounded font-bold">Agregar</button>
                <button type="button" id="btn-cancel" onclick="resetForm()" class="hidden w-full bg-gray-200 p-2 rounded">Cancelar</button>
            </form>
            
            <div class="mt-8 border-t pt-4">
                <label class="text-xs text-gray-500 uppercase">Número de canchas</label>
                <input type="number" id="c-count" value="1" class="w-full p-2 border rounded mt-1">
                <button onclick="generateRounds()" class="w-full mt-4 bg-green-600 text-white p-2 rounded font-bold">⚡ Generar Rondas</button>
                <button onclick="clearAllData()" class="w-full mt-2 bg-red-100 text-red-600 p-2 rounded text-xs font-bold">🗑️ Borrar Caché / Resetear</button>
            </div>
        </div>

        <div class="md:col-span-2 space-y-6">
            <div class="bg-white p-5 rounded-xl shadow border border-gray-200">
                <h2 class="font-bold">Mis Jugadores (<span id="p-count">0</span>)</h2>
                <div id="players-list" class="mt-4 space-y-1"></div>
            </div>
            
            <div id="results-panel" class="hidden bg-white p-5 rounded-xl shadow border border-gray-200">
                <div class="flex justify-between items-center mb-4 pb-3 border-b">
                    <h2 class="font-bold">Resultados</h2>
                    <div class="space-x-2">
                        <button onclick="exportImage()" class="text-xs bg-purple-600 text-white px-3 py-1 rounded">📸 Exportar</button>
                        <button onclick="document.getElementById('results-panel').classList.add('hidden')" class="text-xs bg-gray-100 px-3 py-1 rounded">Cerrar</button>
                    </div>
                </div>
                <div id="rounds-container" class="space-y-4"></div>
                <div id="summary-container" class="mt-6 pt-4 border-t border-dashed"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let players = JSON.parse(localStorage.getItem('pb_final_v8')) || [];

    // --- REGISTRO DEL SERVICE WORKER PARA PWA ---
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(console.error);
    }

    function save() { localStorage.setItem('pb_final_v8', JSON.stringify(players)); renderList(); }

    function renderList() {
        const list = document.getElementById('players-list');
        document.getElementById('p-count').textContent = players.length;
        list.innerHTML = '';
        players.sort((a,b) => (a.name || "").localeCompare(b.name || "")).forEach(p => {
            list.innerHTML += `
            <div class="flex items-center justify-between p-2 border-b text-sm">
                <div>
                    <input type="checkbox" ${p.active ? 'checked' : ''} onchange="toggleActive('${p.id}')">
                    <span class="ml-2 ${!p.active ? 'text-gray-400':''}">${p.name || 'Sin nombre'} (Niv ${p.level || 5})</span>
                </div>
                <div class="space-x-2">
                    <button onclick="editPlayer('${p.id}')" class="text-blue-500">Edit</button>
                    <button onclick="deletePlayer('${p.id}')" class="text-red-500">Del</button>
                </div>
            </div>`;
        });
    }

    function handleForm(e) {
        e.preventDefault();
        const id = document.getElementById('p-id').value;
        const name = document.getElementById('p-name').value.trim() || "Jugador";
        const level = parseInt(document.getElementById('p-level').value) || 5;
        if (id) {
            const p = players.find(x => x.id === id);
            if(p) { p.name = name; p.level = level; }
        } else {
            players.push({ id: 'id_' + Date.now(), name: name, level: level, active: true });
        }
        resetForm(); save(); return false;
    }

    function resetForm() {
        document.getElementById('p-id').value = '';
        document.getElementById('p-name').value = '';
        document.getElementById('p-level').value = '5';
        document.getElementById('btn-submit').textContent = "Agregar";
        document.getElementById('btn-cancel').classList.add('hidden');
    }

    function deletePlayer(id) { players = players.filter(x => x.id !== id); save(); }
    function toggleActive(id) { const p = players.find(x => x.id === id); if(p) p.active = !p.active; save(); }
    function editPlayer(id) {
        const p = players.find(x => x.id === id);
        if(!p) return;
        document.getElementById('p-id').value = p.id;
        document.getElementById('p-name').value = p.name;
        document.getElementById('p-level').value = p.level;
        document.getElementById('btn-submit').textContent = "Guardar";
        document.getElementById('btn-cancel').classList.remove('hidden');
    }
    
    function clearAllData() { 
        if(confirm("¿Borrar todo y limpiar caché?")) { 
            players = []; localStorage.removeItem('pb_final_v8'); renderList(); document.getElementById('results-panel').classList.add('hidden');
        } 
    }

    function generateRounds() {
        const active = players.filter(p => p && p.active && p.name && p.name.trim() !== "");
        const courts = parseInt(document.getElementById('c-count').value) || 1;
        const needed = courts * 4;

        if (active.length < needed) { alert(`Faltan jugadores. Necesitas ${needed} activos. Tienes ${active.length}.`); return; }

        let stats = {};
        active.forEach(p => stats[p.id] = 0);
        let roundsHtml = '';

        for(let r = 1; r <= 5; r++) {
            let pool = active.map(p => ({ p, weight: (stats[p.id] * 100) + Math.random() }));
            pool.sort((a,b) => a.weight - b.weight);
            let play = pool.slice(0, needed).map(x => x.p);
            play.forEach(p => stats[p.id]++);

            roundsHtml += `<h3 class="font-bold text-blue-600">Ronda ${r}</h3><div class="grid grid-cols-2 gap-2 mb-4">`;
            
            for(let c = 0; c < courts; c++) {
                let group = play.slice(c*4, c*4+4); // Sacamos los 4 de la cancha
                
                if(group.length === 4) {
                    const avg1 = ((Number(group.level) + Number(group.level)) / 2).toFixed(1);
                    const avg2 = ((Number(group.level) + Number(group.level)) / 2).toFixed(1);
                    
                    roundsHtml += `
                    <div class="border p-2 rounded text-xs bg-white mb-2">
                        <div class="font-semibold truncate">${group.name} & ${group.name}</div>
                        <div class="text-red-500 font-bold">VS</div>
                        <div class="font-semibold truncate">${group.name} & ${group.name}</div>
                        <div class="text-xs text-gray-500 mt-1">Niv: ${avg1} vs ${avg2}</div>
                    </div>`;
                }
            }
            roundsHtml += `</div>`;
            
            let resting = pool.slice(needed).map(x => x.p.name).join(', ');
            if(resting) roundsHtml += `<p class="text-xs text-amber-600 italic mb-4">⏳ Descansan: ${resting}</p>`;
        }
        document.getElementById('rounds-container').innerHTML = roundsHtml;
        let summary = `<h3 class="font-bold mb-2">📊 Recuento de Partidos</h3><div class="grid grid-cols-2 gap-2 text-xs">`;
        active.forEach(p => summary += `<div class="p-1 border rounded truncate">${p.name || 'Jugador'}: <b>${stats[p.id] || 0}</b></div>`);
        summary += `</div>`;
        document.getElementById('summary-container').innerHTML = summary;
        document.getElementById('results-panel').classList.remove('hidden');
    }

    function exportImage() {
        html2canvas(document.getElementById('results-panel')).then(c => {
            const link = document.createElement('a');
            link.download = "Rondas.png";
            link.href = c.toDataURL();
            link.click();
        });
    }

    renderList();
</script>
</body>
</html>
